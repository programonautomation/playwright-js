name: QA Automation - Playwright JS + Java 17 + Allure

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch a ejecutar"
        required: true
        default: "main"
        type: string

      environment:
        description: "Ambiente de prueba"
        required: true
        default: "test"
        type: choice
        options:
          - dev
          - test
          - homo

      browser:
        description: "Browser Playwright"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

      run_playwright:
        description: "Ejecutar pruebas Playwright JS"
        required: true
        default: true
        type: boolean

      run_java_tests:
        description: "Ejecutar pruebas Java/Maven"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  qa-tests:
    name: Ejecutar pruebas QA
    runs-on: ubuntu-latest
    timeout-minutes: 60

    environment: ${{ inputs.environment }}

    env:
      CI: true
      TEST_ENV: ${{ inputs.environment }}
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout del branch seleccionado
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Mostrar contexto de ejecución
        run: |
          echo "Branch ejecutado: ${{ inputs.target_branch }}"
          echo "Ambiente: ${{ inputs.environment }}"
          echo "Browser: ${{ inputs.browser }}"
          echo "Run Playwright: ${{ inputs.run_playwright }}"
          echo "Run Java tests: ${{ inputs.run_java_tests }}"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias Node
        if: ${{ inputs.run_playwright }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Instalar navegadores Playwright
        if: ${{ inputs.run_playwright }}
        run: npx playwright install --with-deps

      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Ejecutar pruebas Playwright
        id: playwright_tests
        if: ${{ inputs.run_playwright }}
        continue-on-error: true
        run: |
          if [ "${{ inputs.browser }}" = "all" ]; then
            npx playwright test --reporter=line,html,allure-playwright
          else
            npx playwright test --project="${{ inputs.browser }}" --reporter=line,html,allure-playwright
          fi

      - name: Ejecutar pruebas Java con Maven
        id: java_tests
        if: ${{ inputs.run_java_tests }}
        continue-on-error: true
        run: |
          if [ -f pom.xml ]; then
            mvn -B clean test
          else
            echo "No se encontró pom.xml. Se omite ejecución Maven."
          fi

      - name: Preparar resultados Allure
        if: always()
        run: |
          mkdir -p merged-allure-results

          if [ -d "allure-results" ]; then
            cp -r allure-results/* merged-allure-results/ || true
          fi

          if [ -d "target/allure-results" ]; then
            cp -r target/allure-results/* merged-allure-results/ || true
          fi

          echo "Contenido de resultados Allure:"
          ls -la merged-allure-results || true

      - name: Generar reporte Allure
        if: always()
        run: |
          if [ "$(find merged-allure-results -type f | wc -l)" -gt 0 ]; then
            allure generate merged-allure-results --clean -o allure-report
          else
            echo "No se encontraron resultados Allure para generar reporte."
          fi

      - name: Subir reporte Allure como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Subir reporte HTML de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Subir evidencias Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_number }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Fallar pipeline si fallaron las pruebas
        if: |
          steps.playwright_tests.outcome == 'failure' ||
          steps.java_tests.outcome == 'failure'
        run: |
          echo "Una o más ejecuciones de prueba fallaron."
          exit 1
name: QA Automation - Playwright JS + Allure

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch a ejecutar"
        required: true
        default: "main"
        type: string

      browser:
        description: "Browser Playwright"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

permissions:
  contents: read

jobs:
  playwright-tests:
    name: Ejecutar pruebas Playwright JS
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true

    steps:
      - name: Checkout del branch seleccionado
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Mostrar contexto de ejecución
        run: |
          echo "Branch ejecutado: ${{ inputs.target_branch }}"
          echo "Browser: ${{ inputs.browser }}"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias Node
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps

      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Ejecutar pruebas Playwright
        id: playwright_tests
        continue-on-error: true
        run: |
          if [ "${{ inputs.browser }}" = "all" ]; then
            npx playwright test --reporter=line,html,allure-playwright
          else
            npx playwright test --project="${{ inputs.browser }}" --reporter=line,html,allure-playwright
          fi

      - name: Generar reporte Allure
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "No se encontraron resultados Allure para generar reporte."
          fi

      - name: Subir reporte Allure como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Subir reporte HTML de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Subir evidencias Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_number }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Fallar pipeline si fallaron las pruebas
        if: ${{ steps.playwright_tests.outcome == 'failure' }}
        run: |
          echo "Una o más pruebas Playwright fallaron."
          exit 1
